services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FRAMES_DIR=/app/data/frames
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS}
    volumes:
      - ./frame_data:/app/data/frames
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`frame.oesterlin.dev`)"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    networks:
      - traefik_web

networks:
  traefik_web:
    external: true
